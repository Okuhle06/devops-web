name: Deploy Website

on:
  push:

jobs:
  deploy:
    runs-on: ubuntu-latest

   steps:
   - name: Check out code
     uses: actions/checkout@v4

   - name: deploy to EC2
     uses: appleboy/ssh-action@v1.0.3

      with:
        host: YOUR_PUBLIC_IP
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}

        script: |
          cd ~/web-project
          git pull origin master
          sudo cp ~/web-project/index.html /var/www/html/index.html
